name: release

# Push a tag like v0.1.0 to build CARE Clinic installers for all three OSes and
# attach them to a GitHub Release. (This dir must be its own git repo on GitHub.)
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-latest, platform: "darwin/universal", name: macos }
          - { os: ubuntu-22.04, platform: "linux/amd64", name: linux }
          - { os: windows-latest, platform: "windows/amd64", name: windows }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Linux build deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        working-directory: app
        run: wails build -platform ${{ matrix.platform }} -clean

      - name: Package artifact
        working-directory: app/build/bin
        shell: bash
        run: |
          case "${{ matrix.name }}" in
            macos)   zip -ry "CARE-Clinic-macos.zip" *.app ;;
            windows) 7z a "CARE-Clinic-windows.zip" *.exe ;;
            linux)   tar -czf "CARE-Clinic-linux.tar.gz" "CARE Clinic" ;;
          esac

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: "CARE Clinic ${{ github.ref_name }}"
          files: |
            app/build/bin/CARE-Clinic-*.zip
            app/build/bin/CARE-Clinic-*.tar.gz
